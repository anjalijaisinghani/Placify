spring.application.name=placify

server.port=${PLACIFY_SERVER_PORT:8080}

spring.datasource.url=jdbc:mysql://localhost:3306/placify?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${PLACIFY_DB_USERNAME:username}
spring.datasource.password=${PLACIFY_DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

app.jwt.secret=${PLACIFY_JWT_SECRET:PlacifyJwtSecretKeyForCampusPlacementManagementSystem2026Secure}
app.jwt.expiration-ms=${PLACIFY_JWT_EXPIRATION_MS:86400000}
app.seed.enabled=${PLACIFY_SEED_ENABLED:true}
app.upload.dir=${PLACIFY_UPLOAD_DIR:./uploads}

# ── Email (SMTP) ────────────────────────────────────────────────────
spring.mail.host=${PLACIFY_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${PLACIFY_MAIL_PORT:587}
spring.mail.username=${PLACIFY_MAIL_USERNAME:email@gmail.com}
spring.mail.password=${PLACIFY_MAIL_PASSWORD:password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=${PLACIFY_MAIL_FROM:email@gmail.com}
app.mail.enabled=${PLACIFY_MAIL_ENABLED:true}
app.frontend.url=${PLACIFY_FRONTEND_URL:http://localhost:5173}

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
spring.web.resources.static-locations=classpath:/static/,file:./uploads/

logging.level.org.springframework.web.servlet.handler.HandlerMappingIntrospector=ERROR
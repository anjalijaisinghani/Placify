<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#07101f">
    <title>Placify | My Profile</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" href="/images/Logo.png">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="app">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <img class="brand-logo" src="/images/Logo.png" alt="Placify">
            <div class="brand-copy">
                <strong>Placify</strong>
                <small>Campus Placement OS</small>
            </div>
        </div>
        <p class="sidebar-section-label">Student Menu</p>
        <nav id="siteNav"></nav>
        <div class="sidebar-footer">
            <p class="sidebar-version">Placify &bull; v1.0</p>
        </div>
    </aside>

    <div class="app-main">
        <header class="topbar">
            <button class="topbar-toggle" id="sidebarToggle" type="button" aria-label="Toggle sidebar">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <rect y="2" width="16" height="1.5" rx="1" fill="currentColor"/>
                    <rect y="7.25" width="16" height="1.5" rx="1" fill="currentColor"/>
                    <rect y="12.5" width="16" height="1.5" rx="1" fill="currentColor"/>
                </svg>
            </button>
            <span class="topbar-title">My Profile</span>
            <div class="topbar-right">
                <button class="topbar-notify" type="button" aria-label="Notifications">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
                        <path d="M8 1.5a4.5 4.5 0 0 1 4.5 4.5c0 2.5.8 3.8 1.5 4.5H2c.7-.7 1.5-2 1.5-4.5A4.5 4.5 0 0 1 8 1.5z"/>
                        <path d="M6.5 13.5a1.5 1.5 0 0 0 3 0"/>
                    </svg>
                    <span class="topbar-notify-dot"></span>
                </button>
                <div id="headerActions"></div>
            </div>
        </header>

        <main class="page-content">
            <div class="page-main">
                <div class="content-grid">
                    <!-- Profile snapshot -->
                    <section class="panel">
                        <div class="panel-header">
                            <div>
                                <span class="eyebrow">Profile Snapshot</span>
                                <h2>Your profile</h2>
                                <p class="panel-copy">Keep these details current before applying.</p>
                            </div>
                        </div>
                        <div id="profileSnapshot"></div>
                    </section>

                    <!-- Edit form -->
                    <section class="panel">
                        <div class="panel-header">
                            <div>
                                <span class="eyebrow">Update Profile</span>
                                <h2>Edit details</h2>
                                <p class="panel-copy">Changes are saved immediately.</p>
                            </div>
                        </div>

                        <form id="profileForm" class="form-stack" novalidate>
                            <label class="field">
                                <span>Branch / Department</span>
                                <input id="profileBranch" type="text" placeholder="e.g. Computer Science Engineering" required>
                            </label>
                            <label class="field">
                                <span>Skills <small>(comma-separated)</small></span>
                                <textarea id="profileSkills" rows="3" placeholder="Java, Spring Boot, MySQL, REST APIs" required></textarea>
                            </label>
                            <label class="field">
                                <span>CGPA <small>(0.0 – 10.0)</small></span>
                                <input id="profileCgpa" type="number" min="0" max="10" step="0.01" placeholder="e.g. 8.5">
                            </label>
                            <div class="field">
                                <span>Resume <small>(PDF · max 2 MB)</small></span>
                                <label class="resume-upload-zone" id="resumeZone">
                                    <input id="resumeFile" type="file" accept=".pdf" class="resume-file-hidden">
                                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M9 12V4"/><path d="M5 8l4-4 4 4"/>
                                        <path d="M2 14h14"/>
                                    </svg>
                                    <span id="resumeZoneLabel">Click to choose PDF</span>
                                </label>
                                <p class="resume-current-hint" id="resumeCurrentHint"></p>
                            </div>
                            <button class="button primary" id="profileSaveBtn" type="submit">Save Changes</button>
                        </form>
                    </section>
                </div>
            </div>
        </main>
    </div>
</div>

<script>
    const toggle = document.getElementById("sidebarToggle");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("sidebarOverlay");
    function closeSidebar() { sidebar.classList.remove("open"); overlay.classList.remove("open"); }
    toggle.addEventListener("click", () => { sidebar.classList.toggle("open"); overlay.classList.toggle("open"); });
    overlay.addEventListener("click", closeSidebar);
</script>
<script type="module" src="/js/profile-page.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#07101f">
    <title>Placify | Sign In</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" href="/images/Logo.png">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-body">

<header class="auth-topbar">
    <a class="auth-topbar-brand" href="/">
        <img src="/images/Logo.png" alt="Placify">
        <span>Placify</span>
    </a>
    <a class="auth-topbar-link" href="/register.html">Create account</a>
</header>

<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-card-header">
            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-subtitle">Sign in to your Placify account</p>
        </div>

        <div class="alert hidden" id="pageMessage" role="status" aria-live="polite"></div>

        <form class="form-stack" id="loginForm" novalidate>
            <label class="field">
                <span>Email address</span>
                <input id="loginEmail" type="email" placeholder="you@college.edu" autocomplete="email" required>
            </label>
            <label class="field">
                <span>Password</span>
                <input id="loginPassword" type="password" placeholder="Your password" autocomplete="current-password" required>
            </label>
            <button class="button primary button--full" id="loginButton" type="submit">Sign In</button>
        </form>

        <p class="auth-alt-link">Don't have an account? <a href="/register.html">Create one free</a></p>
    </div>
</div>

<script type="module" src="/js/login-page.js"></script>
</body>
</html>

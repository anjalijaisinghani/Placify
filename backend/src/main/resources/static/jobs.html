<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#07101f">
    <title>Placify | Job Listings</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" href="/images/Logo.png">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="app">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <img class="brand-logo" src="/images/Logo.png" alt="Placify">
            <div class="brand-copy">
                <strong>Placify</strong>
                <small>Campus Placement OS</small>
            </div>
        </div>
        <p class="sidebar-section-label">Navigation</p>
        <nav id="siteNav"></nav>
        <div class="sidebar-footer">
            <p class="sidebar-version">Placify &bull; v1.0</p>
        </div>
    </aside>

    <div class="app-main">
        <header class="topbar">
            <button class="topbar-toggle" id="sidebarToggle" type="button" aria-label="Toggle sidebar">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <rect y="2" width="16" height="1.5" rx="1" fill="currentColor"/>
                    <rect y="7.25" width="16" height="1.5" rx="1" fill="currentColor"/>
                    <rect y="12.5" width="16" height="1.5" rx="1" fill="currentColor"/>
                </svg>
            </button>
            <span class="topbar-title">Job Listings</span>
            <div class="topbar-right">
                <button class="topbar-notify" type="button" aria-label="Notifications">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
                        <path d="M8 1.5a4.5 4.5 0 0 1 4.5 4.5c0 2.5.8 3.8 1.5 4.5H2c.7-.7 1.5-2 1.5-4.5A4.5 4.5 0 0 1 8 1.5z"/>
                        <path d="M6.5 13.5a1.5 1.5 0 0 0 3 0"/>
                    </svg>
                    <span class="topbar-notify-dot"></span>
                </button>
                <div id="headerActions"></div>
            </div>
        </header>

        <main class="page-content">
            <div class="page-main">
                <div class="alert hidden" id="pageMessage" role="status" aria-live="polite"></div>

                <section class="content-grid">
                    <section class="panel panel--sticky-top">
                        <div class="panel-header">
                            <div>
                                <span class="eyebrow">Filters</span>
                                <h2>Refine openings</h2>
                                <p class="panel-copy">Use only the filters you need.</p>
                            </div>
                        </div>
                        <form id="filterForm" class="form-stack">
                            <label class="field">
                                <span>Job Title</span>
                                <input id="filterTitle" type="text" placeholder="Backend, analyst, developer">
                            </label>
                            <label class="field">
                                <span>Company</span>
                                <select id="filterCompanyId"></select>
                            </label>
                            <label class="field">
                                <span>Eligibility</span>
                                <input id="filterEligibility" type="text" placeholder="CGPA, branch, batch">
                            </label>
                            <label class="field">
                                <span>Visibility</span>
                                <select id="filterActive">
                                    <option value="true">Active jobs only</option>
                                    <option value="">All jobs</option>
                                    <option value="false">Inactive jobs only</option>
                                </select>
                            </label>
                            <div class="inline-actions">
                                <button class="button primary" type="submit">Apply Filters</button>
                                <button class="button ghost" id="resetFiltersButton" type="button">Reset</button>
                            </div>
                        </form>
                    </section>

                    <section class="panel">
                        <div class="toolbar">
                            <div>
                                <span class="eyebrow">Results</span>
                                <h2>Available roles</h2>
                                <p class="helper-text" id="jobsMeta">Loading jobs...</p>
                            </div>
                            <div id="jobsToolbarAction"></div>
                        </div>
                        <div class="cards-grid" id="jobsGrid"></div>
                    </section>
                </section>
            </div>
        </main>
    </div>
</div>

<script>
    const toggle = document.getElementById("sidebarToggle");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("sidebarOverlay");
    function closeSidebar() { sidebar.classList.remove("open"); overlay.classList.remove("open"); }
    toggle.addEventListener("click", () => { sidebar.classList.toggle("open"); overlay.classList.toggle("open"); });
    overlay.addEventListener("click", closeSidebar);
</script>
<script type="module" src="/js/jobs-page.js"></script>
</body>
</html>
